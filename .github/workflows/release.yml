name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build (linux)
        run: GOOS=linux GOARCH=amd64 go build -o ct-cli-linux-amd64 .
      - name: Build (windows)
        run: GOOS=windows GOARCH=amd64 go build -o ct-cli-windows-amd64.exe .
      - name: Build (macOS amd64)
        run: GOOS=darwin GOARCH=amd64 go build -o ct-cli-darwin-amd64 .
      - name: Build (macOS arm64)
        run: GOOS=darwin GOARCH=arm64 go build -o ct-cli-darwin-arm64 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ct-cli-linux-amd64
            ct-cli-windows-amd64.exe
            ct-cli-darwin-amd64
            ct-cli-darwin-arm64
          generate_release_notes: true
